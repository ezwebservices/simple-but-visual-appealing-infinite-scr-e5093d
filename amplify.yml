version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npx ampx generate outputs --branch $AWS_BRANCH --app-id $AWS_APP_ID
        - npm ci --cache .npm --prefer-offline
        - node -e "const o=require('./amplify_outputs.json'); if(!o.auth||!o.auth.user_pool_id){console.error('ERROR: amplify_outputs.json is missing auth config');process.exit(1);}"
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
      - node_modules/**/*
