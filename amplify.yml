version: 1
frontend:
  phases:
    preBuild:
      commands:
        - '[ -f amplify_outputs.json ] || echo "{}" > amplify_outputs.json'
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
      - node_modules/**/*
