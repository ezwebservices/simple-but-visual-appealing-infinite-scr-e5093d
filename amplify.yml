version: 1
backend:
  phases:
    build:
      commands:
        - npm ci --cache .npm --prefer-offline
        - cd amplify/functions/create-subscription && npm install && cd ../../..
        - cd amplify/functions/stripe-webhook && npm install && cd ../../..
        - cd amplify/functions/subscription-status && npm install && cd ../../..
        # Skipped: Amplify CodeBuild role lacks ssm:GetParameter on /cdk-bootstrap/hnb659fds/version (BootstrapDetectionError). Re-enable once IAM is fixed.
        # - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    preBuild:
      commands:
        # Skipped: Amplify CodeBuild role lacks cloudformation:GetTemplateSummary. Using committed amplify_outputs.json instead.
        - echo "Using committed amplify_outputs.json"
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
      - node_modules/**/*
