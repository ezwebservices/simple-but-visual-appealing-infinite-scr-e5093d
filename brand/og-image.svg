<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="skyBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#81D4FA"/>
      <stop offset="60%" stop-color="#4FC3F7"/>
      <stop offset="100%" stop-color="#B2EBF2"/>
    </linearGradient>
    <linearGradient id="grass" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#81C784"/>
      <stop offset="100%" stop-color="#66BB6A"/>
    </linearGradient>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#00000018"/>
    </filter>
    <filter id="textShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#00000025"/>
    </filter>
  </defs>

  <!-- Sky background -->
  <rect width="1200" height="630" fill="url(#skyBg)" rx="0"/>

  <!-- Clouds -->
  <g opacity="0.6" fill="#FFFFFF">
    <ellipse cx="150" cy="100" rx="80" ry="35"/>
    <ellipse cx="200" cy="85" rx="60" ry="30"/>
    <ellipse cx="110" cy="90" rx="50" ry="25"/>

    <ellipse cx="900" cy="70" rx="70" ry="30"/>
    <ellipse cx="950" cy="58" rx="55" ry="25"/>
    <ellipse cx="860" cy="62" rx="45" ry="22"/>

    <ellipse cx="550" cy="50" rx="50" ry="22"/>
    <ellipse cx="590" cy="42" rx="40" ry="18"/>
  </g>

  <!-- Rolling grass hills -->
  <ellipse cx="300" cy="630" rx="500" ry="200" fill="url(#grass)"/>
  <ellipse cx="900" cy="630" rx="550" ry="180" fill="#72B876"/>
  <rect x="0" y="530" width="1200" height="100" fill="#81C784"/>

  <!-- Small flowers in grass -->
  <g>
    <circle cx="100" cy="560" r="8" fill="#FFD54F"/>
    <circle cx="100" cy="560" r="3" fill="#FFB74D"/>
    <circle cx="250" cy="575" r="7" fill="#FF8A80"/>
    <circle cx="250" cy="575" r="2.5" fill="#EF5350"/>
    <circle cx="450" cy="565" r="6" fill="#CE93D8"/>
    <circle cx="450" cy="565" r="2" fill="#AB47BC"/>
    <circle cx="750" cy="570" r="7" fill="#FFD54F"/>
    <circle cx="750" cy="570" r="2.5" fill="#FFB74D"/>
    <circle cx="1050" cy="560" r="8" fill="#FF8A80"/>
    <circle cx="1050" cy="560" r="3" fill="#EF5350"/>
    <circle cx="950" cy="580" r="6" fill="#CE93D8"/>
    <circle cx="950" cy="580" r="2" fill="#AB47BC"/>
  </g>

  <!-- ====== BLOO THE BEAR (left) ====== -->
  <g transform="translate(135, 280) scale(0.85)" filter="url(#softShadow)">
    <!-- Ears -->
    <circle cx="30" cy="10" r="32" fill="#3BA8D8"/>
    <circle cx="30" cy="10" r="18" fill="#FFD54F"/>
    <circle cx="140" cy="10" r="32" fill="#3BA8D8"/>
    <circle cx="140" cy="10" r="18" fill="#FFD54F"/>
    <!-- Head -->
    <circle cx="85" cy="70" r="72" fill="#3BA8D8"/>
    <!-- Muzzle -->
    <ellipse cx="85" cy="88" rx="38" ry="28" fill="#E1F5FE"/>
    <!-- Eyes -->
    <circle cx="60" cy="58" r="11" fill="#4A4A4A"/>
    <circle cx="110" cy="58" r="11" fill="#4A4A4A"/>
    <circle cx="63" cy="54" r="3.5" fill="#FFF"/>
    <circle cx="113" cy="54" r="3.5" fill="#FFF"/>
    <!-- Nose -->
    <ellipse cx="85" cy="80" rx="8" ry="6" fill="#4A4A4A"/>
    <!-- Smile -->
    <path d="M70 93 Q85 110 100 93" stroke="#4A4A4A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Blush -->
    <ellipse cx="47" cy="85" rx="11" ry="7" fill="#FF8A80" opacity="0.45"/>
    <ellipse cx="123" cy="85" rx="11" ry="7" fill="#FF8A80" opacity="0.45"/>
    <!-- Body -->
    <ellipse cx="85" cy="180" rx="50" ry="55" fill="#3BA8D8"/>
    <ellipse cx="85" cy="185" rx="32" ry="35" fill="#E1F5FE"/>
    <!-- Arms (waving!) -->
    <ellipse cx="20" cy="160" rx="18" ry="30" fill="#3BA8D8" transform="rotate(-20, 20, 160)"/>
    <ellipse cx="150" cy="145" rx="18" ry="30" fill="#3BA8D8" transform="rotate(25, 150, 145)"/>
    <!-- Feet -->
    <ellipse cx="60" cy="230" rx="20" ry="12" fill="#3BA8D8"/>
    <ellipse cx="110" cy="230" rx="20" ry="12" fill="#3BA8D8"/>
  </g>

  <!-- ====== SUNNY THE LION (right) ====== -->
  <g transform="translate(900, 270) scale(0.85)" filter="url(#softShadow)">
    <!-- Mane -->
    <circle cx="85" cy="60" r="80" fill="#FFB74D"/>
    <!-- Mane spikes -->
    <g fill="#FF9800">
      <ellipse cx="85" cy="-15" rx="18" ry="22" transform="rotate(0, 85, 60)"/>
      <ellipse cx="150" cy="15" rx="18" ry="22" transform="rotate(55, 85, 60)"/>
      <ellipse cx="160" cy="80" rx="18" ry="22" transform="rotate(90, 85, 60)"/>
      <ellipse cx="20" cy="15" rx="18" ry="22" transform="rotate(-55, 85, 60)"/>
      <ellipse cx="10" cy="80" rx="18" ry="22" transform="rotate(-90, 85, 60)"/>
      <ellipse cx="30" cy="130" rx="16" ry="20" transform="rotate(-130, 85, 60)"/>
      <ellipse cx="140" cy="130" rx="16" ry="20" transform="rotate(130, 85, 60)"/>
    </g>
    <!-- Head -->
    <circle cx="85" cy="65" r="58" fill="#FFD54F"/>
    <!-- Muzzle -->
    <ellipse cx="85" cy="82" rx="30" ry="22" fill="#FFF9C4"/>
    <!-- Eyes -->
    <circle cx="62" cy="55" r="10" fill="#4A4A4A"/>
    <circle cx="108" cy="55" r="10" fill="#4A4A4A"/>
    <circle cx="65" cy="51" r="3" fill="#FFF"/>
    <circle cx="111" cy="51" r="3" fill="#FFF"/>
    <!-- Nose -->
    <ellipse cx="85" cy="74" rx="7" ry="5.5" fill="#4A4A4A"/>
    <!-- Big smile -->
    <path d="M68 89 Q85 108 102 89" stroke="#4A4A4A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Blush -->
    <ellipse cx="45" cy="78" rx="10" ry="6" fill="#FF8A80" opacity="0.4"/>
    <ellipse cx="125" cy="78" rx="10" ry="6" fill="#FF8A80" opacity="0.4"/>
    <!-- Body -->
    <ellipse cx="85" cy="175" rx="45" ry="50" fill="#FFD54F"/>
    <ellipse cx="85" cy="180" rx="28" ry="32" fill="#FFF9C4"/>
    <!-- Arms -->
    <ellipse cx="25" cy="155" rx="16" ry="28" fill="#FFD54F" transform="rotate(15, 25, 155)"/>
    <ellipse cx="145" cy="148" rx="16" ry="28" fill="#FFD54F" transform="rotate(-20, 145, 148)"/>
    <!-- Feet -->
    <ellipse cx="60" cy="222" rx="18" ry="11" fill="#FFD54F"/>
    <ellipse cx="110" cy="222" rx="18" ry="11" fill="#FFD54F"/>
    <!-- Tail -->
    <path d="M135 195 Q170 170 165 200 Q162 215 155 210" stroke="#FFB74D" stroke-width="5" fill="none" stroke-linecap="round"/>
    <circle cx="165" cy="200" r="8" fill="#FF9800"/>
  </g>

  <!-- ====== FLOATING NUMBER BUBBLES ====== -->
  <!-- Bubble 1 -->
  <g filter="url(#softShadow)">
    <circle cx="460" cy="220" r="52" fill="#FFFFFF" opacity="0.92"/>
    <text x="460" y="240" font-family="Fredoka One, Baloo 2, Arial Rounded MT Bold, sans-serif" font-size="56" font-weight="800" fill="#4FC3F7" text-anchor="middle">1</text>
  </g>
  <!-- Plus -->
  <text x="535" y="238" font-family="Fredoka One, Baloo 2, Arial Rounded MT Bold, sans-serif" font-size="44" font-weight="800" fill="#81C784" text-anchor="middle" filter="url(#textShadow)">+</text>
  <!-- Bubble 2 -->
  <g filter="url(#softShadow)">
    <circle cx="610" cy="220" r="52" fill="#FFFFFF" opacity="0.92"/>
    <text x="610" y="240" font-family="Fredoka One, Baloo 2, Arial Rounded MT Bold, sans-serif" font-size="56" font-weight="800" fill="#FF8A80" text-anchor="middle">2</text>
  </g>
  <!-- Equals -->
  <text x="685" y="238" font-family="Fredoka One, Baloo 2, Arial Rounded MT Bold, sans-serif" font-size="44" font-weight="800" fill="#CE93D8" text-anchor="middle" filter="url(#textShadow)">=</text>
  <!-- Bubble 3 -->
  <g filter="url(#softShadow)">
    <circle cx="760" cy="220" r="52" fill="#FFD54F" opacity="0.92"/>
    <text x="760" y="240" font-family="Fredoka One, Baloo 2, Arial Rounded MT Bold, sans-serif" font-size="56" font-weight="800" fill="#4A4A4A" text-anchor="middle">3</text>
  </g>

  <!-- ====== TITLE: NumPals ====== -->
  <!-- Text outline/shadow layer -->
  <text x="600" y="430" font-family="Fredoka One, Baloo 2, Arial Rounded MT Bold, sans-serif" font-size="88" font-weight="800" fill="#3BA8D8" text-anchor="middle" stroke="#2196B3" stroke-width="3" filter="url(#textShadow)">NumPals</text>
  <!-- Main text -->
  <text x="600" y="430" font-family="Fredoka One, Baloo 2, Arial Rounded MT Bold, sans-serif" font-size="88" font-weight="800" fill="#FFFFFF" text-anchor="middle" stroke="#3BA8D8" stroke-width="4" paint-order="stroke">NumPals</text>

  <!-- Tagline -->
  <text x="600" y="475" font-family="Fredoka One, Baloo 2, Arial Rounded MT Bold, sans-serif" font-size="30" font-weight="700" fill="#FFFFFF" text-anchor="middle" opacity="0.95" filter="url(#textShadow)">Swipe, Count, Roar!</text>

  <!-- ====== DECORATIVE STARS ====== -->
  <g fill="#FFD54F">
    <polygon points="380,140 385,125 390,140 375,131 395,131" transform="scale(1.5) translate(-130,-40)"/>
    <polygon points="820,130 825,118 830,130 817,123 833,123" transform="scale(1.3) translate(-190,-25)"/>
    <polygon points="500,490 504,480 508,490 497,484 511,484"/>
    <polygon points="700,490 704,480 708,490 697,484 711,484"/>
    <polygon points="340,350 343,342 346,350 338,345 348,345"/>
    <polygon points="860,350 863,342 866,350 858,345 868,345"/>
  </g>

  <!-- Sparkle dots -->
  <circle cx="420" cy="170" r="4" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="780" cy="160" r="3" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="600" cy="140" r="3.5" fill="#FFFFFF" opacity="0.65"/>
  <circle cx="350" cy="300" r="3" fill="#FFD54F" opacity="0.5"/>
  <circle cx="850" cy="310" r="3" fill="#FFD54F" opacity="0.5"/>
</svg>
